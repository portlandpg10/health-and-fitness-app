version: "3.8"

services:
  app:
    build: .
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/health.db
      - AUTH_PIN=${AUTH_PIN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
    volumes:
      - health-data:/app/data
    restart: unless-stopped

volumes:
  health-data:
